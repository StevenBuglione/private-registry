name: Upstream review signal
on:
  schedule:
    - cron: '17 8 1 */3 *'
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: refs
        shell: bash
        run: |
          set -euo pipefail
          approved=$(tr -d '\r\n' < .upstream/OPEN_TOFU_COMMIT)
          latest=$(git ls-remote https://github.com/opentofu/registry-ui.git refs/heads/main | cut -f1)
          test -n "$approved"
          test -n "$latest"
          echo "approved=$approved" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
      - name: Record review requirement
        if: steps.refs.outputs.approved != steps.refs.outputs.latest
        uses: actions/github-script@v7
        env:
          APPROVED_COMMIT: ${{ steps.refs.outputs.approved }}
          OBSERVED_COMMIT: ${{ steps.refs.outputs.latest }}
        with:
          script: |
            const title = `Review OpenTofu Registry UI upstream ${process.env.OBSERVED_COMMIT.slice(0, 12)}`;
            const body = [
              'A scheduled check found a newer upstream main commit.',
              '',
              `Approved: \`${process.env.APPROVED_COMMIT}\``,
              `Observed: \`${process.env.OBSERVED_COMMIT}\``,
              '',
              'Follow UPSTREAM.md. Do not update automatically.'
            ].join('\n');
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              ...context.repo,
              state: 'open',
              per_page: 100
            });
            if (!existing.some(issue => issue.title === title)) {
              await github.rest.issues.create({ ...context.repo, title, body });
            }
