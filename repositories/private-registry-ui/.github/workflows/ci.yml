name: UI CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Import approved upstream frontend
        run: ./scripts/import-upstream.sh
      - name: Apply enterprise overlays
        run: ./scripts/apply-overlays.sh
      - name: Verify provenance
        run: ./scripts/verify-upstream.sh
      - name: Validate runtime template
        run: python3 ./scripts/check-runtime-template.py
      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: app
        run: pnpm lint
      - name: Unit tests
        working-directory: app
        run: pnpm run test --run
      - name: Build
        working-directory: app
        run: pnpm build
      - name: Build container
        run: docker build --build-arg VITE_BUILD_SHA=${GITHUB_SHA} -t private-registry-ui:${GITHUB_SHA} .
