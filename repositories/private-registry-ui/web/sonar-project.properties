sonar.projectKey=private-registry-ui
sonar.projectName=Private Registry UI
sonar.sources=src
sonar.tests=src,e2e
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,e2e/**/*.spec.ts
sonar.exclusions=src/**/*.test.ts,src/**/*.test.tsx,src/test/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPaths=tsconfig.app.json,tsconfig.node.json,tsconfig.e2e.json
sonar.coverage.exclusions=src/main.tsx,src/vite-env.d.ts
sonar.sourceEncoding=UTF-8
