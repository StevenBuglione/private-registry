openapi: 3.1.0
info:
  title: Registry API
  version: 1.0.0
  description: |
    Authenticated catalog, event-stream, and operational interfaces for Registry.
    Package binaries remain in Artifactory and are never served by this API. Catalog responses are
    filtered by the caller's Microsoft Entra APM entitlements; unauthorized and nonexistent package
    identities intentionally return the same response.
servers:
  - url: /
    description: Same-origin Registry deployment
security:
  - oidcSession: []
tags:
  - name: Authentication
  - name: Catalog
  - name: Event stream
  - name: Administration
  - name: Sync API keys
    description: |
      Administrator-only lifecycle operations for scoped GitHub runner credentials. Creating a key
      returns its plaintext token exactly once; listing and revocation never disclose the secret.
  - name: Artifact sync
    description: |
      Runner-facing endpoint authenticated by a Registry sync credential. In Swagger Authorize,
      paste the `rgs.…` token without adding `Bearer`.
  - name: Webhook
  - name: Health
paths:
  /api/v1/auth/session:
    get:
      tags: [Authentication]
      operationId: getSession
      summary: Return the authenticated Registry session
      responses:
        '200':
          description: Safe identity, role, entitlement, and CSRF data. OAuth tokens are never returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/IdentityUnavailable'
  /api/v1/auth/logout:
    post:
      tags: [Authentication]
      operationId: logout
      summary: Terminate the server-side session
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: Session terminated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: CSRF token is missing or invalid
  /api/v1/catalog/packages:
    get:
      tags: [Catalog]
      operationId: listCatalogPackages
      summary: Search and browse the authorized catalog
      parameters:
        - name: q
          in: query
          description: Case-insensitive search across namespace, name, title, and description.
          schema: {type: string}
        - name: kind
          in: query
          schema: {type: string, enum: [module, provider]}
        - name: namespace
          in: query
          description: Exact package namespace, matched case-insensitively.
          schema:
            type: string
            pattern: '^[A-Za-z0-9._-]{1,128}$'
        - name: provider
          in: query
          description: Comma-separated module targets. Values are combined with OR semantics.
          schema: {type: string, example: aws,azure}
        - name: tier
          in: query
          description: Comma-separated Registry tiers. Values are combined with OR semantics.
          schema:
            type: string
            example: official,partner
        - name: category
          in: query
          description: Comma-separated provider categories. Values are combined with OR semantics.
          schema:
            type: string
            example: public-cloud,networking
        - name: sort
          in: query
          description: Relevance applies when q is present; without q it is normalized to updated.
          schema:
            type: string
            enum: [relevance, updated, name, downloads]
            default: updated
        - name: cursor
          in: query
          description: Opaque cursor returned by the previous page; it must be used with the same sort and cannot be combined with page.
          schema: {type: string}
        - name: page
          in: query
          description: One-based browser page number; cannot be combined with cursor.
          schema: {type: integer, minimum: 1, maximum: 10000}
        - name: limit
          in: query
          schema: {type: integer, minimum: 1, maximum: 100, default: 25}
      responses:
        '200':
          description: Authorized catalog page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/IdentityUnavailable'
  /api/v1/catalog/counts:
    get:
      tags: [Catalog]
      operationId: getCatalogCounts
      summary: Return truthful authorized package counts
      responses:
        '200':
          description: Counts include only packages visible to the caller.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogCounts'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/IdentityUnavailable'
  /api/v1/catalog/packages/provider/{namespace}/{name}:
    get:
      tags: [Catalog]
      operationId: getProviderPackage
      summary: Return the latest authorized provider summary
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
      responses:
        '200': {$ref: '#/components/responses/PackageSummary'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/PackageNotFound'}
        '503': {$ref: '#/components/responses/IdentityUnavailable'}
  /api/v1/catalog/packages/provider/{namespace}/{name}/{version}:
    get:
      tags: [Catalog]
      operationId: getProviderPackageVersion
      summary: Return an authorized provider summary for one version
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/Version'
      responses:
        '200': {$ref: '#/components/responses/PackageSummary'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/PackageNotFound'}
        '503': {$ref: '#/components/responses/IdentityUnavailable'}
  /api/v1/catalog/packages/provider/{namespace}/{name}/versions:
    get:
      tags: [Catalog]
      operationId: listProviderVersions
      summary: List authorized provider versions
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
      responses:
        '200': {$ref: '#/components/responses/PackageVersions'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/PackageNotFound'}
        '503': {$ref: '#/components/responses/IdentityUnavailable'}
  /api/v1/catalog/packages/provider/{namespace}/{name}/{version}/versions:
    get:
      tags: [Catalog]
      operationId: listProviderVersionsFromVersion
      summary: List provider versions after validating one authorized version
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/Version'
      responses:
        '200': {$ref: '#/components/responses/PackageVersions'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/PackageNotFound'}
        '503': {$ref: '#/components/responses/IdentityUnavailable'}
  /api/v1/catalog/packages/provider/{namespace}/{name}/documentation:
    get:
      tags: [Catalog]
      operationId: getLatestProviderDocumentation
      summary: Return latest authorized provider documentation
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/DocumentPath'
      responses:
        '200': {$ref: '#/components/responses/MarkdownDocument'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/PackageNotFound'}
        '503': {$ref: '#/components/responses/IdentityUnavailable'}
  /api/v1/catalog/packages/provider/{namespace}/{name}/{version}/documentation:
    get:
      tags: [Catalog]
      operationId: getProviderDocumentation
      summary: Return authorized provider documentation for one version
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/Version'
        - $ref: '#/components/parameters/DocumentPath'
      responses:
        '200': {$ref: '#/components/responses/MarkdownDocument'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/PackageNotFound'}
        '503': {$ref: '#/components/responses/IdentityUnavailable'}
  /api/v1/catalog/packages/module/{namespace}/{name}/{target}:
    get:
      tags: [Catalog]
      operationId: getModulePackage
      summary: Return the latest authorized module summary
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/Target'
      responses:
        '200': {$ref: '#/components/responses/PackageSummary'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/PackageNotFound'}
        '503': {$ref: '#/components/responses/IdentityUnavailable'}
  /api/v1/catalog/packages/module/{namespace}/{name}/{target}/{version}:
    get:
      tags: [Catalog]
      operationId: getModulePackageVersion
      summary: Return an authorized module summary for one version
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/Target'
        - $ref: '#/components/parameters/Version'
      responses:
        '200': {$ref: '#/components/responses/PackageSummary'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/PackageNotFound'}
        '503': {$ref: '#/components/responses/IdentityUnavailable'}
  /api/v1/catalog/packages/module/{namespace}/{name}/{target}/versions:
    get:
      tags: [Catalog]
      operationId: listModuleVersions
      summary: List authorized module versions
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/Target'
      responses:
        '200': {$ref: '#/components/responses/PackageVersions'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/PackageNotFound'}
        '503': {$ref: '#/components/responses/IdentityUnavailable'}
  /api/v1/catalog/packages/module/{namespace}/{name}/{target}/{version}/versions:
    get:
      tags: [Catalog]
      operationId: listModuleVersionsFromVersion
      summary: List module versions after validating one authorized version
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/Target'
        - $ref: '#/components/parameters/Version'
      responses:
        '200': {$ref: '#/components/responses/PackageVersions'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/PackageNotFound'}
        '503': {$ref: '#/components/responses/IdentityUnavailable'}
  /api/v1/catalog/packages/module/{namespace}/{name}/{target}/documentation:
    get:
      tags: [Catalog]
      operationId: getLatestModuleDocumentation
      summary: Return latest authorized module documentation
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/Target'
        - $ref: '#/components/parameters/DocumentPath'
      responses:
        '200': {$ref: '#/components/responses/MarkdownDocument'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/PackageNotFound'}
        '503': {$ref: '#/components/responses/IdentityUnavailable'}
  /api/v1/catalog/packages/module/{namespace}/{name}/{target}/{version}/documentation:
    get:
      tags: [Catalog]
      operationId: getModuleDocumentation
      summary: Return authorized module documentation for one version
      parameters:
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
        - $ref: '#/components/parameters/Target'
        - $ref: '#/components/parameters/Version'
        - $ref: '#/components/parameters/DocumentPath'
      responses:
        '200': {$ref: '#/components/responses/MarkdownDocument'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/PackageNotFound'}
        '503': {$ref: '#/components/responses/IdentityUnavailable'}
  /api/v1/catalog/events:
    get:
      tags: [Event stream]
      operationId: streamCatalogEvents
      summary: Stream authorized catalog changes
      description: Events never include APM assignment lists. Clients should invalidate affected catalog queries.
      responses:
        '200':
          description: Server-sent event stream containing connected and catalog-change events.
          content:
            text/event-stream:
              schema: {type: string}
              examples:
                catalogChange:
                  value: |-
                    event: catalog-change
                    id: provider/platform/cloud:2026-07-22T04:00:00Z
                    data: {"package_id":"provider/platform/cloud","change_type":"indexed","occurred_at":"2026-07-22T04:00:00Z"}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/IdentityUnavailable'
  /api/v1/registry/homepage:
    get:
      tags: [Administration]
      operationId: getHomepageSettings
      summary: Return the administrator-managed homepage presentation
      responses:
        '200':
          description: Current notification and featured-provider configuration.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HomepageSettings'}
        '401': {$ref: '#/components/responses/Unauthorized'}
    put:
      tags: [Administration]
      operationId: updateHomepageSettings
      summary: Replace the homepage presentation configuration
      description: Requires the registry-admin role and writes immutable before/after audit evidence.
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/HomepageSettingsUpdate'}
      responses:
        '200':
          description: Updated homepage configuration.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HomepageSettings'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {description: Registry administrator access is required.}
  /api/v1/admin/dashboard:
    get:
      tags: [Administration]
      operationId: getAdminDashboard
      summary: Return point-in-time catalog and ingestion telemetry
      responses:
        '200':
          description: Registry health, dependency, catalog, queue, and ingestion metrics.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AdminDashboard'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {description: Registry administrator access is required.}
  /api/v1/admin/operations:
    get:
      tags: [Administration]
      operationId: listAdminOperations
      summary: List recent structured operational events
      description: Raw process logs, event payloads, and secrets are never exposed.
      parameters:
        - name: limit
          in: query
          schema: {type: integer, minimum: 1, maximum: 100, default: 50}
      responses:
        '200':
          description: Recent ingestion, retry, dead-letter, and reconciliation events.
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/OperationalEvent'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {description: Registry administrator access is required.}
  /api/v1/admin/audit-events:
    get:
      tags: [Administration]
      operationId: listAuditEvents
      summary: List immutable administrator and automation audit history
      parameters:
        - name: limit
          in: query
          schema: {type: integer, minimum: 1, maximum: 100, default: 50}
        - name: before
          in: query
          description: Cursor timestamp; returns events strictly older than this instant.
          schema: {type: string, format: date-time}
      responses:
        '200':
          description: Newest-first audit history.
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/AuditEvent'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {description: Registry administrator access is required.}
  /api/v1/admin/sync-credentials:
    get:
      tags: [Sync API keys]
      operationId: listSyncCredentials
      summary: List safe sync credential metadata
      description: Secret values and hashes are never returned.
      responses:
        '200':
          description: Sync credential metadata.
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/SyncCredential'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {description: Registry administrator access is required.}
    post:
      tags: [Sync API keys]
      operationId: createSyncCredential
      summary: Create a scoped, expiring GitHub runner credential
      description: The plaintext token is returned exactly once and only its SHA-256 digest is retained.
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, scope, expires_in_days]
              properties:
                name:
                  type: string
                  minLength: 3
                  maxLength: 80
                  example: GitHub module releases
                scope: {type: string, enum: [module, provider, all]}
                expires_in_days:
                  type: integer
                  minimum: 1
                  maximum: 365
                  example: 90
              additionalProperties: false
      responses:
        '200':
          description: Credential metadata and one-time token.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CreatedSyncCredential'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {description: Registry administrator access is required.}
  /api/v1/admin/sync-credentials/{id}:
    delete:
      tags: [Sync API keys]
      operationId: revokeSyncCredential
      summary: Irreversibly revoke a sync credential
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: Revoked credential metadata.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SyncCredential'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {description: Registry administrator access is required.}
        '404': {description: Sync credential does not exist.}
  /api/v1/sync/artifacts:
    post:
      tags: [Artifact sync]
      operationId: triggerArtifactSync
      summary: Enqueue an Artifactory artifact change from a trusted runner
      description: |
        Authenticates a scoped, unexpired Registry sync credential and publishes the normalized
        hint to the same durable PostgreSQL queue used by signed JFrog webhooks. The request is
        idempotent for a credential and Idempotency-Key pair.
      security:
        - syncCredential: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: |
            A runner-generated key unique to this publication attempt. Reusing it with the same
            credential safely returns the original receipt instead of enqueueing a duplicate.
          schema:
            type: string
            minLength: 8
            maxLength: 128
            pattern: '^[A-Za-z0-9._:-]+$'
            example: github-run-1842-module-release
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/TriggerSyncRequest'}
      responses:
        '202':
          description: Event durably accepted by the PostgreSQL queue.
          content:
            application/json:
              schema: {$ref: '#/components/schemas/TriggerSyncReceipt'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {description: Credential is invalid, expired, or revoked.}
        '403': {description: Credential scope does not permit the package kind.}
        '503': {description: Durable event ingestion is not enabled or available.}
  /api/v1/status:
    get:
      tags: [Health]
      operationId: getApiStatus
      summary: Return API build and uptime metadata
      responses:
        '200':
          description: API status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /internal/webhooks/jfrog:
    post:
      tags: [Webhook]
      operationId: receiveJfrogWebhook
      summary: Accept a signed JFrog artifact or property event
      description: |
        This route bypasses interactive OIDC authentication but validates the raw-body HMAC signature,
        configured JPD origin, subscription identifier, repository allowlist, content type, and payload size.
        The signing secret and delegated credentials are never returned by any API.
      security: []
      parameters:
        - name: X-JFrog-Signature
          in: header
          required: true
          description: HMAC-SHA256 over the exact request bytes, encoded as hex, sha256-prefixed hex, or base64.
          schema: {type: string, writeOnly: true}
        - name: X-JFrog-Origin
          in: header
          required: true
          schema: {type: string}
        - name: X-JFrog-Subscription-Id
          in: header
          required: true
          schema: {type: string}
        - name: X-JFrog-Event-Id
          in: header
          required: false
          schema: {type: string}
        - name: X-Correlation-Id
          in: header
          required: false
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JfrogWebhookPayload'
      responses:
        '202':
          description: The normalized event was durably accepted by the PostgreSQL event queue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookReceipt'
        '400':
          description: Payload, repository, path, or event shape is invalid.
        '401':
          description: Signature, origin, or subscription is invalid.
        '413':
          description: Payload exceeds the configured maximum.
        '415':
          description: Content type is not application/json.
        '503':
          description: Signing is not configured or PostgreSQL did not accept the event.
  /health/live:
    get:
      tags: [Health]
      operationId: getLiveness
      summary: Report process liveness
      security: []
      responses:
        '200':
          description: Process is live
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Liveness'}
  /health/ready:
    get:
      tags: [Health]
      operationId: getApiReadiness
      summary: Report API read dependencies
      description: API readiness covers PostgreSQL; Artifactory is deliberately a worker dependency.
      security: []
      responses:
        '200':
          description: API dependencies are ready
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HealthReport'}
        '503':
          description: A required API dependency is unavailable
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HealthReport'}
  /health/worker:
    get:
      tags: [Health]
      operationId: getWorkerReadiness
      summary: Report worker dependencies
      description: Present when ingestion is enabled; probes PostgreSQL and Artifactory.
      security: []
      responses:
        '200':
          description: Worker dependencies are ready
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HealthReport'}
        '503':
          description: A worker dependency is unavailable
          content:
            application/json:
              schema: {$ref: '#/components/schemas/HealthReport'}
components:
  securitySchemes:
    oidcSession:
      type: openIdConnect
      openIdConnectUrl: https://login.microsoftonline.com/common/v2.0/.well-known/openid-configuration
      description: |
        Microsoft Entra OIDC is terminated by the production ALB or by the local Spring OAuth2 client.
        The browser holds only a secure server-side session cookie; ALB identity headers are verified by the API.
    syncCredential:
      type: http
      scheme: bearer
      bearerFormat: RegistrySyncCredential
      description: |
        Scoped, expiring token generated by a Registry administrator and returned once. Paste the
        `rgs.…` token only; Swagger UI adds the `Bearer` prefix automatically.
  parameters:
    Namespace:
      name: namespace
      in: path
      required: true
      schema: {type: string, minLength: 1}
    Name:
      name: name
      in: path
      required: true
      schema: {type: string, minLength: 1}
    Target:
      name: target
      in: path
      required: true
      schema: {type: string, minLength: 1}
    Version:
      name: version
      in: path
      required: true
      description: Exact non-revoked package version, or latest.
      schema: {type: string, minLength: 1}
    DocumentPath:
      name: path
      in: query
      description: Safe relative documentation path within the selected package version. Defaults to README.md for modules and index.md for providers.
      schema:
        type: string
        minLength: 1
        pattern: '^(?!/)(?!.*(?:^|/)\.\.?(?:/|$))(?!.*\\).+$'
    CsrfToken:
      name: X-XSRF-TOKEN
      in: header
      required: true
      description: Token returned as csrf_token by the session endpoint and mirrored in the XSRF-TOKEN cookie.
      schema: {type: string, writeOnly: true}
  responses:
    PackageSummary:
      description: Authorized package summary. For explicit version routes, latest_version is the selected version.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/CatalogPackage'}
    PackageVersions:
      description: Authorized package versions
      content:
        application/json:
          schema:
            type: array
            items: {$ref: '#/components/schemas/PackageVersion'}
    MarkdownDocument:
      description: Markdown documentation for the authorized package version.
      content:
        text/markdown:
          schema: {type: string}
    BadRequest:
      description: A filter, cursor, route, or request value is invalid.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ApiError'}
    Unauthorized:
      description: No valid OIDC session or verified ALB identity is present.
    PackageNotFound:
      description: Package or version does not exist, is revoked, or is not available to the caller.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ApiError'}
    IdentityUnavailable:
      description: Microsoft Graph or another required identity component is unavailable; access fails closed.
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ApiError'}
  schemas:
    HomepageSettings:
      allOf:
        - $ref: '#/components/schemas/HomepageSettingsUpdate'
        - type: object
          required: [updated_at]
          properties:
            updated_at: {type: string, format: date-time}
    HomepageSettingsUpdate:
      type: object
      required:
        - notification_enabled
        - notification_title
        - notification_message
        - featured_provider_ids
        - featured_module_ids
      properties:
        notification_enabled: {type: boolean}
        notification_title: {type: string, minLength: 1, maxLength: 120}
        notification_message: {type: string, minLength: 1, maxLength: 600}
        notification_link_label: {type: string, maxLength: 80}
        notification_link_url:
          type: string
          maxLength: 500
          description: HTTPS or Registry-relative URL.
        featured_provider_ids:
          type: array
          maxItems: 6
          uniqueItems: true
          items:
            type: string
            pattern: '^provider/[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$'
        featured_module_ids:
          type: array
          maxItems: 6
          uniqueItems: true
          items:
            type: string
            pattern: '^module/[A-Za-z0-9._-]+/[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$'
      additionalProperties: false
    AdminDashboard:
      type: object
      required:
        - generated_at
        - status
        - worker_enabled
        - dependencies
        - catalog
        - queue
        - ingestion
        - database_size_bytes
      properties:
        generated_at: {type: string, format: date-time}
        status: {type: string, enum: [healthy, degraded]}
        worker_enabled: {type: boolean}
        dependencies:
          type: object
          additionalProperties:
            type: string
            enum: [up, down, not_configured]
        catalog:
          type: object
          required: [providers, modules, active_versions, documents, downloads]
          properties:
            providers: {type: integer, minimum: 0}
            modules: {type: integer, minimum: 0}
            active_versions: {type: integer, minimum: 0}
            documents: {type: integer, minimum: 0}
            downloads: {type: integer, minimum: 0}
        queue:
          type: object
          required: [queued, processing, retry, completed, dead_letter]
          properties:
            queued: {type: integer, minimum: 0}
            processing: {type: integer, minimum: 0}
            retry: {type: integer, minimum: 0}
            completed: {type: integer, minimum: 0}
            dead_letter: {type: integer, minimum: 0}
        ingestion:
          type: object
          required: [completed, failed, quarantined, latency_p95_ms]
          properties:
            completed: {type: integer, minimum: 0}
            failed: {type: integer, minimum: 0}
            quarantined: {type: integer, minimum: 0}
            latency_p95_ms: {type: integer, minimum: 0}
            last_completed_at: {type: string, format: date-time}
        reconciliation:
          type: object
          required: [id, mode, scope, status, discrepancies, repaired, started_at]
          properties:
            id: {type: string, format: uuid}
            mode: {type: string}
            scope: {type: string}
            status: {type: string, enum: [running, completed, failed]}
            discrepancies: {type: integer, minimum: 0}
            repaired: {type: integer, minimum: 0}
            started_at: {type: string, format: date-time}
            completed_at: {type: string, format: date-time}
        database_size_bytes: {type: integer, minimum: 0}
      additionalProperties: false
    OperationalEvent:
      type: object
      required: [source, event_id, status, title, detail, correlation_id, occurred_at]
      properties:
        source: {type: string, enum: [ingestion, queue, reconciliation]}
        event_id: {type: string}
        status: {type: string}
        title: {type: string}
        detail: {type: string}
        repository: {type: string}
        path: {type: string}
        correlation_id: {type: string}
        occurred_at: {type: string, format: date-time}
      additionalProperties: false
    AuditEvent:
      type: object
      required:
        - id
        - occurred_at
        - actor_type
        - actor_id
        - action
        - resource_type
        - resource_id
        - correlation_id
        - detail
      properties:
        id: {type: string, format: uuid}
        occurred_at: {type: string, format: date-time}
        actor_type: {type: string, enum: [user, api_key, system]}
        actor_id: {type: string}
        action: {type: string}
        resource_type: {type: string}
        resource_id: {type: string}
        correlation_id: {type: string}
        detail: {type: object, additionalProperties: true}
      additionalProperties: false
    SyncCredential:
      type: object
      required:
        - id
        - name
        - scope
        - key_prefix
        - created_by
        - created_at
        - expires_at
        - use_count
        - status
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        scope: {type: string, enum: [MODULE, PROVIDER, ALL]}
        key_prefix: {type: string}
        created_by: {type: string}
        created_at: {type: string, format: date-time}
        expires_at: {type: string, format: date-time}
        revoked_at: {type: string, format: date-time}
        revoked_by: {type: string}
        last_used_at: {type: string, format: date-time}
        use_count: {type: integer, minimum: 0}
        status: {type: string, enum: [ACTIVE, EXPIRED, REVOKED]}
      additionalProperties: false
    CreatedSyncCredential:
      type: object
      required: [credential, token]
      properties:
        credential: {$ref: '#/components/schemas/SyncCredential'}
        token:
          type: string
          readOnly: true
          pattern: '^rgs\.[0-9a-fA-F-]{36}\.[A-Za-z0-9_-]+$'
          example: rgs.00000000-0000-0000-0000-000000000000.EXAMPLE_ONE_TIME_SECRET
          description: Returned once. Store as a masked GitHub Actions secret and never log it.
      additionalProperties: false
    TriggerSyncRequest:
      type: object
      required: [kind, repository, path]
      properties:
        kind: {type: string, enum: [module, provider]}
        repository:
          type: string
          enum: [iac-module-release-local, iac-provider-release-local]
          example: iac-module-release-local
        path:
          type: string
          minLength: 1
          maxLength: 1024
          pattern: '^(?!/)(?!.*(?:^|/)\.\.?(?:/|$))(?!.*\\).+$'
          example: terraform-aws-modules/vpc/aws/6.0.1.zip
        action:
          type: string
          enum: [DEPLOYED, PROPERTIES_CHANGED, DELETED, MOVED, COPIED]
          default: DEPLOYED
      additionalProperties: false
    TriggerSyncReceipt:
      type: object
      required: [event_id, publication_id, status]
      properties:
        event_id: {type: string}
        publication_id: {type: string}
        status: {type: string, const: accepted}
      additionalProperties: false
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: {type: string}
            message: {type: string}
          additionalProperties: false
      additionalProperties: false
    Session:
      type: object
      required: [subject, display_name, roles, apm_entitlements, csrf_token]
      properties:
        subject: {type: string}
        display_name: {type: string}
        email: {type: [string, 'null'], format: email}
        roles:
          type: array
          uniqueItems: true
          items: {type: string, enum: [registry-user, registry-admin]}
        apm_entitlements:
          type: array
          items: {$ref: '#/components/schemas/ApmEntitlement'}
        csrf_token:
          type: string
          description: CSRF token only; this is not an OAuth access token.
      additionalProperties: false
    ApmEntitlement:
      type: object
      required: [apm_id, display_name]
      properties:
        apm_id: {type: string, pattern: '^APM[0-9]{7}$'}
        display_name: {type: string}
      additionalProperties: false
    LogoutResponse:
      type: object
      required: [redirect_uri]
      properties:
        redirect_uri: {type: string, format: uri-reference}
      additionalProperties: false
    CatalogPage:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: {$ref: '#/components/schemas/CatalogPackage'}
        next_cursor: {type: [string, 'null']}
        total: {type: integer, format: int64, minimum: 0}
      additionalProperties: false
    CatalogCounts:
      type: object
      required: [modules, providers]
      properties:
        modules: {type: integer, format: int64, minimum: 0}
        providers: {type: integer, format: int64, minimum: 0}
      additionalProperties: false
    CatalogPackage:
      type: object
      required:
        - id
        - kind
        - namespace
        - name
        - target
        - title
        - description
        - latest_version
        - verification
        - source_address
        - updated_at
        - versions
        - symbols
      properties:
        id: {type: string, description: Canonical module/... or provider/... identity.}
        kind: {type: string, enum: [module, provider]}
        namespace: {type: string}
        name: {type: string}
        target: {type: string, description: Module target; empty for providers.}
        title: {type: string}
        description: {type: string}
        latest_version:
          type: string
          description: Latest visible version, or the selected version on an explicit version route.
        verification: {type: string}
        source_address: {type: string}
        updated_at: {type: string, format: date-time}
        versions:
          type: array
          items: {$ref: '#/components/schemas/PackageVersion'}
        symbols:
          type: array
          items: {$ref: '#/components/schemas/Symbol'}
      additionalProperties: false
    PackageVersion:
      type: object
      required:
        - version
        - published_at
        - package_digest
        - documentation_digest
        - documentation_root
        - source_commit
        - prerelease
        - deprecated
        - revoked
      properties:
        version: {type: string}
        published_at: {type: string, format: date-time}
        package_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
        documentation_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
        documentation_root: {type: string}
        source_commit: {type: string}
        prerelease: {type: boolean}
        deprecated: {type: boolean}
        revoked: {type: boolean}
      additionalProperties: false
    Symbol:
      type: object
      required: [kind, name, required, sensitive]
      properties:
        kind: {type: string, enum: [input, output, resource, data-source, function, guide, dependency]}
        name: {type: string}
        description: {type: [string, 'null']}
        path: {type: [string, 'null']}
        type: {type: [string, 'null'], description: Raw Terraform type expression when declared.}
        default_value:
          type: [string, 'null']
          description: Raw HCL default expression. Registry returns but never evaluates this value.
        required: {type: boolean}
        sensitive: {type: boolean}
      additionalProperties: false
    WebhookReceipt:
      type: object
      required: [event_id, publication_id]
      properties:
        event_id: {type: string}
        publication_id: {type: string}
      additionalProperties: false
    JfrogWebhookPayload:
      type: object
      description: Supported JFrog artifact or property webhook envelope. Unknown vendor fields are ignored.
      properties:
        id: {type: string}
        event_id: {type: string}
        event_type: {type: string}
        type: {type: string}
        occurred_at: {type: string, format: date-time}
        data:
          type: object
          properties:
            repo_key: {type: string}
            repository: {type: string}
            path: {type: string}
            item_path: {type: string}
            event_type: {type: string}
            properties:
              type: object
              additionalProperties: {type: string}
          additionalProperties: true
      additionalProperties: true
    ApiStatus:
      type: object
      required: [status, version, started_at]
      properties:
        status: {type: string, const: ok}
        version: {type: string}
        started_at: {type: string, format: date-time}
      additionalProperties: false
    Liveness:
      type: object
      required: [status]
      properties:
        status: {type: string, const: live}
      additionalProperties: false
    HealthReport:
      type: object
      required: [status, dependencies]
      properties:
        status: {type: string, enum: [ready, not_ready]}
        dependencies:
          type: object
          additionalProperties: {type: string}
      additionalProperties: false
