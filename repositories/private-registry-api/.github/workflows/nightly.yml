name: API nightly quality

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

concurrency:
  group: api-nightly-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mutation:
    name: Full quality and mutation tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v6
      - name: Run full quality and PITest gate
        run: bash scripts/quality.sh nightly
      - name: Upload nightly reports
        if: ${{ always() && env.ACT != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: api-nightly-reports-${{ github.run_id }}
          path: |
            build/reports/**
            build/test-results/**
          if-no-files-found: warn
          retention-days: 30
