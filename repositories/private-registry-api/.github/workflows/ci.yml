name: API CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle
      - uses: actions/setup-python@v5
        with: {python-version: '3.13'}
      - run: python -m pip install --disable-pip-version-check jsonschema
      - run: python3 scripts/validate-contracts.py
      - run: chmod +x gradlew
      - run: ./gradlew --no-daemon check
      - run: docker compose config --quiet
      - run: docker build -t private-registry-api:${GITHUB_SHA} .
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: {terraform_version: '1.15.8'}
      - run: terraform fmt -check -recursive infrastructure/terraform
      - name: Validate every Terraform root
        run: |
          set -euo pipefail
          for root in bootstrap global modules/platform live/dev live/prod live/dr; do
            terraform -chdir="infrastructure/terraform/$root" init -backend=false -input=false
            terraform -chdir="infrastructure/terraform/$root" validate
          done
