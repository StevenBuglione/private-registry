name: UI security

on:
  pull_request:
    paths:
      - 'repositories/private-registry-ui/**'
      - '.github/workflows/ui-security.yml'
  push:
    branches: [main]
  schedule:
    - cron: '41 4 * * *'
  workflow_dispatch:

concurrency:
  group: ui-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  container:
    name: Container scan and CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build UI image
        run: docker build --tag private-registry-ui:security-scan repositories/private-registry-ui

      - name: Generate CycloneDX image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: private-registry-ui:security-scan
          format: cyclonedx-json
          output-file: ui-image.cdx.json
          upload-artifact: false

      - name: Scan image for high-severity vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: private-registry-ui:security-scan
          format: sarif
          output: trivy-ui-image.sarif
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true

      - name: Upload Trivy findings to code scanning
        if: >-
          ${{ always() && env.ACT != 'true' &&
              (github.event_name != 'pull_request' ||
               github.event.pull_request.head.repo.fork == false) }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-ui-image.sarif
          category: trivy-ui-image

      - name: Upload security evidence
        if: ${{ always() && env.ACT != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: ui-container-security-${{ github.run_id }}
          path: |
            ui-image.cdx.json
            trivy-ui-image.sarif
          if-no-files-found: error
          retention-days: 30
