name: API quality gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: api-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Gradle PR quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: repositories/private-registry-api
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Configure Testcontainers under act
        if: ${{ env.ACT }}
        run: |
          echo 'TESTCONTAINERS_HOST_OVERRIDE=host.docker.internal' >> "$GITHUB_ENV"
          echo 'TESTCONTAINERS_RYUK_DISABLED=true' >> "$GITHUB_ENV"

      - name: Run formatting, correctness, architecture, test, coverage, and security gates
        run: bash scripts/quality.sh pr

      - name: Upload quality reports
        if: ${{ always() && env.ACT != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: api-quality-reports-${{ github.run_id }}
          path: |
            repositories/private-registry-api/build/reports/**
            repositories/private-registry-api/build/test-results/**
          if-no-files-found: warn
          retention-days: 14

  sonarqube:
    name: SonarQube new-code gate
    needs: quality
    if: >-
      ${{ vars.SONAR_ENABLED == 'true' &&
          vars.SONAR_HOST_URL != '' &&
          vars.SONAR_PROJECT_KEY != '' &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.fork == false) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Produce compiled classes and coverage input
        working-directory: repositories/private-registry-api
        run: bash scripts/quality.sh sonar-input

      - name: Analyze with SonarQube
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: repositories/private-registry-api
          args: >-
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.qualitygate.wait=true
