name: Validate blueprint

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: validate-blueprint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install validation libraries
        run: python -m pip install --disable-pip-version-check pyyaml jsonschema python-hcl2
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.15.8'
      - name: Validate
        env:
          SKIP_JAVA_VALIDATION: 'true'
        run: ./scripts/validate-blueprint.sh
      - name: Start and smoke-test the complete Compose stack
        working-directory: repositories/private-registry-api
        run: |
          docker compose up --build --wait
          curl --fail --silent --show-error http://localhost:8080/health/ready
          curl --fail --silent --show-error http://localhost:3000/config/runtime.json
          curl --fail --silent --show-error 'http://localhost:3000/registry/docs/search?q=vpc'
      - name: Stop Compose stack
        if: always()
        working-directory: repositories/private-registry-api
        run: docker compose down --volumes
