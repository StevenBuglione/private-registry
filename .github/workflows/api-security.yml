name: API security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

concurrency:
  group: api-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out complete history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan repository with Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: ${{ env.ACT != 'true' }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: ${{ env.ACT != 'true' }}
          GITLEAKS_ENABLE_SUMMARY: ${{ env.ACT != 'true' }}

  container:
    name: Container security and SBOM
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build API image
        run: docker build --tag private-registry-api:security-scan repositories/private-registry-api

      - name: Generate CycloneDX image SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          image: private-registry-api:security-scan
          format: cyclonedx-json
          output-file: api-image.cdx.json
          upload-artifact: false

      - name: Install Trivy under act
        if: ${{ env.ACT == 'true' }}
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.5
        with:
          version: v0.70.0
          cache: true

      - name: Scan image for high-severity vulnerabilities under act
        if: ${{ env.ACT == 'true' }}
        run: >-
          trivy image
          --format sarif
          --output trivy-api-image.sarif
          --exit-code 1
          --ignore-unfixed
          --severity HIGH,CRITICAL
          private-registry-api:security-scan

      - name: Scan image for high-severity vulnerabilities
        if: ${{ env.ACT != 'true' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: private-registry-api:security-scan
          format: sarif
          output: trivy-api-image.sarif
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true

      - name: Upload Trivy findings to code scanning
        if: >-
          ${{ always() && env.ACT != 'true' &&
              (github.event_name != 'pull_request' ||
               github.event.pull_request.head.repo.fork == false) }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-api-image.sarif
          category: trivy-api-image

      - name: Upload security evidence
        if: ${{ always() && env.ACT != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: api-container-security-${{ github.run_id }}
          path: |
            api-image.cdx.json
            trivy-api-image.sarif
          if-no-files-found: error
          retention-days: 30
